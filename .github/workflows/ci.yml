name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --python ${{ matrix.python-version }}
      - run: uv run ruff check .
      - run: uv run mypy src/
      - run: uv run pytest --cov --cov-report=term-missing --cov-fail-under=100

  # The declared numpy floor (1.26.4) behaves differently from the version uv
  # resolves by default (2.x): stricter generic stubs (register C-19) AND ~1-ulp
  # float differences in histogram binning (register C-24). The boundary a
  # consumer actually pins to must be both type- AND behaviour-checked, so this
  # job runs mypy *and* pytest at the floor.
  floor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.10
      - run: uv run --python 3.10 --with numpy==1.26.4 mypy --strict src/
      - run: uv run --python 3.10 --with numpy==1.26.4 pytest

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv build
